<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e13" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>

    <!-- Subtle Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(226, 184, 83, 0.4)" />
      <stop offset="50%" stop-color="rgba(99, 102, 241, 0.2)" />
      <stop offset="100%" stop-color="rgba(20, 184, 166, 0.4)" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Premium Rounded Tile Container -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="1.5" />

  <!-- Outer Facet (Subtle Background Geometry) -->
  <polygon points="50,15 81,77 19,77" fill="none" stroke="rgba(226, 184, 83, 0.12)" stroke-width="1.2" />

  <!-- Glowing Logo Components -->
  <g filter="url(#glow)">
    <!-- Inner Crystalline "A" Shape -->
    <path d="M50 18 L79 74 L62 74 L50 49 L38 74 L21 74 Z" fill="none" stroke="#e2b853" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Cyan Energy Bridge -->
    <path d="M33 60.5 L67 60.5" fill="none" stroke="#14b8a6" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Indigo Core Node -->
    <circle cx="50" cy="49" r="5" fill="#6366f1" />
  </g>
</svg>